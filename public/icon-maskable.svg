<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MTG Vault">
  <!-- Maskable variant: brand-amber background fills the full safe area so
       Android's adaptive icon mask can crop in any shape (circle, squircle)
       without clipping the mark. The dial+V sits at ~60% of the canvas to
       stay clear of the mask cutoff. -->
  <rect width="512" height="512" fill="#1c1d22"/>
  <g transform="translate(256 256) scale(8)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#e0a63a" stroke-width="2"/>
    <g stroke="#e0a63a" stroke-width="2" stroke-linecap="round">
      <line x1="0" y1="-14" x2="0" y2="-11"/>
      <line x1="14" y1="0" x2="11" y2="0"/>
      <line x1="0" y1="14" x2="0" y2="11"/>
      <line x1="-14" y1="0" x2="-11" y2="0"/>
    </g>
    <path d="M -5.5 -5.5 L 0 5 L 5.5 -5.5" fill="none" stroke="#e0a63a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
