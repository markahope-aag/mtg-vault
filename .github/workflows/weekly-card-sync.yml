name: Weekly card database sync

# Runs the full Scryfall bulk refresh (default_cards → cards/printings/prices,
# plus tutor + game-changer flag passes). GitHub-hosted runners have a 6-hour
# ceiling, so unlike the Vercel cron this always finishes the whole bulk file.
on:
  schedule:
    # Sundays 08:00 UTC
    - cron: "0 8 * * 0"
  workflow_dispatch: {} # allow manual runs from the Actions tab

concurrency:
  group: card-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run full Scryfall sync
        run: pnpm db:seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
