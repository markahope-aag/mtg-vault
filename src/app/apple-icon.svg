<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MTG Vault">
  <!-- Dark rounded square (matches --surface-base) -->
  <rect width="180" height="180" rx="36" fill="#1c1d22"/>
  <!-- Vault dial -->
  <circle cx="90" cy="90" r="64" fill="none" stroke="#e0a63a" stroke-width="6"/>
  <!-- 12 tick marks every 30° — financial dial -->
  <g stroke="#e0a63a" stroke-width="3" stroke-linecap="round">
    <line x1="90" y1="14" x2="90" y2="24"/>
    <line x1="90" y1="156" x2="90" y2="166"/>
    <line x1="14" y1="90" x2="24" y2="90"/>
    <line x1="156" y1="90" x2="166" y2="90"/>
  </g>
  <g stroke="#e0a63a" stroke-width="2" stroke-linecap="round" opacity="0.55">
    <line x1="128" y1="24" x2="124" y2="32"/>
    <line x1="156" y1="52" x2="148" y2="56"/>
    <line x1="156" y1="128" x2="148" y2="124"/>
    <line x1="128" y1="156" x2="124" y2="148"/>
    <line x1="52" y1="156" x2="56" y2="148"/>
    <line x1="24" y1="128" x2="32" y2="124"/>
    <line x1="24" y1="52" x2="32" y2="56"/>
    <line x1="52" y1="24" x2="56" y2="32"/>
  </g>
  <!-- Stylized V (Vault) -->
  <path d="M 58 62 L 90 122 L 122 62" fill="none" stroke="#e0a63a" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
